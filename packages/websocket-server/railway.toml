[build]
  builder = "NIXPACKS"
  buildCommand = "npm install && npm run build"

[deploy]
  startCommand = "npm start"
  healthcheckPath = "/health"
  healthcheckTimeout = 300
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[env]
  NODE_ENV = "production"
  WS_PORT = { default = "8080" }
  HEALTH_PORT = { default = "8081" }
  LOG_LEVEL = { default = "info" }
  ALLOWED_ORIGINS = { default = "https://app.rayai.app" }

# Set these environment variables in Railway dashboard:
# JWT_SECRET = "your-production-jwt-secret"
# ALLOWED_ORIGINS = "https://app.rayai.app,https://staging.rayai.app"

[networking]
  # Railway will automatically assign a domain
  # The WebSocket server will be available at wss://your-app.railway.app