[build]
  builder = "NIXPACKS"
  buildCommand = "npm install"

[deploy]
  startCommand = "node server.js"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 10

[env]
  NODE_ENV = "production"
  PORT = { default = "8080" }
  HEALTH_PORT = { default = "8081" }

[networking]
  # Railway will automatically assign a domain
  # The WebSocket server will be available at wss://your-app.railway.app